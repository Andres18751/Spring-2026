<!DOCTYPE html>
<html>
<head>
    <title>{{ user.username }}'s Loadout</title>
    <style>
        :root { 
            var(--bg): #0d1117;           
            --card-bg: #161b22;      
            --primary: #00ffcc;      
            --primary-glow: rgba(0, 255, 204, 0.4);
            --text-main: #e6edf3;    
            --text-muted: #7d8590;   
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0d1117; 
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            align-items: center;    
            padding-top: 60px; 
            margin: 0; 
        }

        .profile-container {
            width: 600px;
            max-width: 90%;
        }

        /* The Player Card */
        .player-card {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            position: relative;
        }

        /* Neon top accent line */
        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .header-section {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .avatar-placeholder {
            width: 80px;
            height: 80px;
            background: #21262d;
            border: 2px dashed var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        h1 { 
            margin: 0;
            color: var(--text-main);
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }

        .join-date {
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 5px;
            display: block;
        }

        /* Stats & Bio Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-box {
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .stat-box h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .edit-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            color: var(--bg);
            background: var(--primary);
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .back-nav {
            margin-bottom: 20px;
            align-self: flex-start;
        }
        .back-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .back-nav a:hover { color: var(--primary); }

    </style>
</head>
<body>

<div class="profile-container">
    <div class="back-nav">
        <a href="{% url 'home' %}">&larr; Return to Lobby</a>
    </div>

    <div class="player-card">
        <div class="header-section">
            <div class="avatar-placeholder">Avatar</div>
            <div>
                <h1>{{ user.username }}</h1>
                <span class="join-date">Joined: {{ user.date_joined|date:"F Y" }}</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <h3>Current Bio</h3>
                <p style="font-size: 0.9rem; font-style: italic; color: #888;">{{ profile.bio|default:"No bio written yet. Tell the lobby what you play!" }}</p>
            </div>

            <div class="stat-box">
                <h3>Favorite Games</h3>
                <p style="font-size: 0.9rem; color: #888;">{{ profile.favorite_games|default:"No favorite games listed." }}</p>
            </div>
        </div>

        <a href="{% url 'edit_profile' %}" class="edit-btn">Edit Loadout</a>
    </div>
</div>

</body>
</html>
