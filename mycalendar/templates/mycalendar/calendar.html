<!DOCTYPE html>
<html>
<head>
    <title>Gaming Events Calendar</title>
    <style>
        :root { 
            /* Dark Gaming Palette */
            --bg: #0d1117;           /* Deep dark background */
            --card-bg: #161b22;      /* Slightly lighter dark card */
            --primary: #00ffcc;      /* Neon cyan accent */
            --primary-glow: rgba(0, 255, 204, 0.4);
            --text-main: #e6edf3;    /* Crisp off-white text */
            --text-muted: #7d8590;   /* Dimmed gray for headers */
            --cell-bg: #21262d;      /* Dark gray for empty days */
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            align-items: center;    
            padding-top: 50px; 
            margin: 0; 
        }
        
        .calendar-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); /* Deeper shadow for dark mode */
            width: 450px;
        }

        /* Navigation styling */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-nav h2 {
            margin: 0;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px; /* Makes the year look more cinematic */
        }
        .nav-btn {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            padding: 8px 15px;
            border: 1px solid var(--primary);
            border-radius: 5px;
            transition: all 0.3s ease;
            background: transparent;
        }
        /* The glow effect on hover */
        .nav-btn:hover { 
            background: var(--primary); 
            color: var(--bg); 
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* Calendar Table Overrides */
        table.month { width: 100%; border-collapse: separate; border-spacing: 6px; }
        th { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            padding-bottom: 10px; 
            letter-spacing: 1px;
        }
        td { 
            width: 50px; height: 50px; 
            text-align: center; vertical-align: middle; 
            border-radius: 8px; 
            background: var(--cell-bg);
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        /* Neon hover effect for the days */
        td:hover { 
            transform: scale(1.1); 
            background: var(--card-bg); 
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            z-index: 10;
        }
        td a { 
            text-decoration: none; 
            color: var(--text-main); 
            display: block; 
            line-height: 50px; 
            font-weight: 600;
        }
        td:hover a {
            color: var(--primary);
        }
        /* --- NEW: Event Day Highlight Styling --- */
        td.has-event {
            border-color: var(--primary);
            background: rgba(0, 255, 204, 0.05); /* Very faint cyan tint */
            position: relative;
        }
        
        /* The glowing dot indicator */
        td.has-event::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }
        
        /* Make the text glow permanently on event days */
        td.has-event a {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
            font-weight: bold;
        }
        
        .monthname { display: none; }

        /* Back to Home link */
        .home-nav {
            margin-top: 25px;
        }
        .home-nav a {
            text-decoration: none;
            color: var(--text-muted); 
            font-weight: 600;
            transition: color 0.3s, text-shadow 0.3s;
        }
        .home-nav a:hover {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
        }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="calendar-nav">
        <a class="nav-btn" href="{% url 'calendar-specific' prev_year prev_month %}">« Prev</a>
        <h2>{{ year }}</h2>
        <a class="nav-btn" href="{% url 'calendar-specific' next_year next_month %}">Next »</a>
    </div>

    <div class="calendar-body">
        {{ calendar|safe }}
    </div>
</div>

<nav class="home-nav">
    <a href="{% url 'home' %}">&larr; Back to Home</a>
</nav>

<script>
    // Grab the list of event days passed from Django
    // Safely parse the data from Django
    let eventDays = [];
    try {
        // We wrap the Django tag in quotes so it never breaks syntax
        const rawData = "{{ event_days|safe }}"; 
        if (rawData) {
            eventDays = JSON.parse(rawData);S
        }
    } catch (e) {
        console.log("No events found or parsing failed.");
    }    
    // Loop through every day cell inside the calendar table
    document.querySelectorAll('.calendar-body td').forEach(cell => {
        const dayText = cell.innerText.trim();
        
        // Check if the cell actually contains a number
        if (dayText && !isNaN(dayText)) {
            const dayNum = parseInt(dayText, 10);
            
            // If this day number exists in our database list...
            if (eventDays.includes(dayNum)) {
                // 1. Add the neon CSS class
                cell.classList.add('has-event');
                
                // 2. Ensure the cell acts as a clickable link to that specific day
                const existingLink = cell.querySelector('a');
                const dayUrl = `/calendar/{{ year }}/{{ month }}/${dayNum}/`;
                
                if (!existingLink) {
                    // If there isn't a link, create one
                    cell.innerHTML = `<a href="${dayUrl}">${dayNum}</a>`;
                } else {
                    // If a link already exists, just update its destination
                    existingLink.href = dayUrl;
                }
            }
        }
    });
</script>
</body>
</html>
