<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .calendar-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        /* Styling the table generated by Python's calendar module */
        table.month {
            width: 100%;
            border-collapse: collapse;
        }
        table.month th {
            padding: 10px;
            background-color: #007bff;
            color: white;
        }
        table.month td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
        }
        table.month td:hover {
            background-color: #f1f1f1;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        {{ calendar|safe }}
    </div>

</body>
</html>
