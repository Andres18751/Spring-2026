<!DOCTYPE html>
<html>
<head>
    <title>My Django Calendar</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding-top: 50px; }
        
        .calendar-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 450px;
        }

        /* Navigation styling */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .nav-btn {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            padding: 8px 15px;
            border: 1px solid var(--primary);
            border-radius: 5px;
            transition: 0.3s;
        }
        .nav-btn:hover { background: var(--primary); color: white; }

        /* Calendar Table Overrides */
        table.month { width: 100%; border-collapse: separate; border-spacing: 5px; }
        th { color: #888; font-size: 0.8rem; text-transform: uppercase; padding-bottom: 10px; }
        td { 
            width: 50px; height: 50px; 
            text-align: center; vertical-align: middle; 
            border-radius: 8px; background: #fafafa;
            transition: transform 0.2s;
        }
        td:hover { transform: scale(1.1); background: #eef4ff; }
        td a { text-decoration: none; color: #333; display: block; line-height: 50px; }
        
        /* The Month Name header inside the table */
        .monthname { font-size: 1.5rem; color: #333; padding: 10px 0; display: none; }
    </style>
</head>
<body>

<div class="calendar-card">
    <div class="calendar-nav">
        <a class="nav-btn" href="{% url 'calendar-specific' prev_year prev_month %}">« Prev</a>
        <h2 style="margin:0;">{{ year }}</h2>
        <a class="nav-btn" href="{% url 'calendar-specific' next_year next_month %}">Next »</a>
    </div>

    <div class="calendar-body">
        {{ calendar|safe }}
    </div>
</div>

</body>
</html>
