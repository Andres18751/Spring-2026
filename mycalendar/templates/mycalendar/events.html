<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events for {{ date }}</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 40px; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .event { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .event:last-child { border-bottom: none; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <a href="javascript:history.back()" class="back-btn">&larr; Back to Calendar</a>
        
        <h2>Events for {{ date }}</h2>

        {% if events %}
            {% for event in events %}
                <div class="event">
                    <h3>{{ event.title }}</h3>
                    <p>{{ event.description }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>No events scheduled for this day.</p>
        {% endif %}
    </div>

</body>
</html>
