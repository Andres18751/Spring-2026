<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events for {{ date }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #0a0a0a; /* Darkened the background slightly to make the neon pop more */
            color: #e0e0e0; 
            padding: 40px; 
            font-weight: 300; 
            /* A very faint, subtle glow for the body text to keep it readable but atmospheric */
            text-shadow: 0 0 2px rgba(224, 224, 224, 0.3);
        }
        .container { 
            background: #141414; /* Darker container to contrast with the glow */
            padding: 20px 30px; 
            border-radius: 12px; 
            max-width: 600px; 
            margin: auto; 
            /* Added a subtle blue ambient glow to the container itself */
            box-shadow: 0 8px 32px rgba(102, 178, 255, 0.15), 0 0 10px rgba(102, 178, 255, 0.05) inset; 
            border: 1px solid rgba(102, 178, 255, 0.1);
        }
        h2, h3 {
            color: #ffffff; 
            font-weight: 600; 
            letter-spacing: 1px; 
            /* The Neon Glow Effect: Layering tight white shadows with wider colored shadows */
            text-shadow: 
                0 0 5px rgba(255, 255, 255, 0.8),
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px #66b2ff,
                0 0 40px #66b2ff,
                0 0 60px #007bff;
        }
        .event { 
            border-bottom: 1px solid rgba(102, 178, 255, 0.2); /* Tinted the border to match the neon theme */
            padding: 15px 0; 
        }
        .event:last-child { 
            border-bottom: none; 
        }
        .back-btn { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: #66b2ff; 
            text-decoration: none; 
            font-weight: 400;
            text-shadow: 0 0 8px rgba(102, 178, 255, 0.4); /* Base glow for the button */
            transition: all 0.3s ease; 
        }
        .back-btn:hover {
            color: #ffffff; 
            transform: translateX(-4px); 
            /* Intense glow on hover */
            text-shadow: 
                0 0 5px #ffffff,
                0 0 15px #66b2ff,
                0 0 30px #66b2ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="javascript:history.back()" class="back-btn">&larr; Back to Calendar</a>
        
        <h2>Events for {{ date }}</h2>

        {% if events %}
            {% for event in events %}
                <div class="event">
                    <h3>{{ event.title }}</h3>
                    <p>{{ event.description }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>No events scheduled for this day.</p>
        {% endif %}
    </div>

</body>
</html>
